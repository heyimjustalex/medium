- name: Prepare nodes for Kubernetes (kubeadm prerequisites)
  hosts: all
  become: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    # ----------------------------
    # Disable swap (required by kubelet)
    # ----------------------------
    - name: Disable swap immediately
      command: swapoff -a
      when: ansible_swaptotal_mb | int > 0
      changed_when: ansible_swaptotal_mb | int > 0

    - name: Remove swap entries from /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^\s*([^#]+\s+swap\s+.*)$'
        replace: '# \1'

    # ----------------------------
    # Kernel modules (networking)
    # ----------------------------
    - name: Ensure required kernel modules load at boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: '0644'

    - name: Load overlay module
      modprobe:
        name: overlay

    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter

  
    - name: Ensure modules are loaded
      command: lsmod
      register: lsmod_output
      changed_when: false

    - name: Assert required modules are loaded
      assert:
        that:
          - "'overlay' in lsmod_output.stdout"
          - "'br_netfilter' in lsmod_output.stdout"


    # ----------------------------
    # Sysctl tuning for Kubernetes
    # ----------------------------
    - name: Configure sysctl parameters for Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1

          # --- Memory ---
          vm.swappiness=0
          vm.max_map_count=262144

          # --- Network ---
          net.ipv4.ip_local_port_range=1024 65000
          net.core.somaxconn=4096
          net.core.netdev_max_backlog=4096

          # --- Buffers ---
          net.core.rmem_max=16777216
          net.core.wmem_max=16777216

          # --- ARP (keep for kube-vip safety) ---
          net.ipv4.neigh.default.gc_thresh1=4096
          net.ipv4.neigh.default.gc_thresh2=8192
          net.ipv4.neigh.default.gc_thresh3=16384

          # --- File watches ---
          fs.inotify.max_user_instances=8192
          fs.inotify.max_user_watches=1048576
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl settings
      command: sysctl --system
      changed_when: false


    # ----------------------------
    # Required base packages
    # ----------------------------
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install packages
      apt:
        name:
          - apparmor
          - apparmor-utils
          - iputils-arping
          - net-tools
          - python3

        state: present
      when: "'masters' in group_names"
 
    - name: Install Python Kubernetes client via apt (masters only)
      apt:
        name:
          - python3-kubernetes
          - python3-openshift
        state: present
        update_cache: true
      when: "'masters' in group_names"

    - name: Add kubectl alias for root
      lineinfile:
        path: /root/.bashrc
        regexp: '^alias k='
        line: 'alias k=kubectl'
        create: true
        mode: "0644"

    - name: Add kubectl alias for ansible_user
      lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        regexp: '^alias k='
        line: 'alias k=kubectl'
        create: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

        
    - name: Remove NetworkManager if present
      apt:
        name: network-manager
        state: absent