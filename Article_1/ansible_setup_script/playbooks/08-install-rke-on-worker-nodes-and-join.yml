

- name: Install and join RKE2 agents (workers) via kube-vip VIP
  hosts: workers
  become: true
  remote_user: cloud
  gather_facts: false
  serial: 2

  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vault.yml

  tasks:

    - name: Ensure RKE2 config directory exists
      file:
        path: "{{ rke2_config_dir }}"
        state: directory
        mode: "0755"

    - name: Install pinned RKE2 version (agent)
      shell: |
        curl -sfL https://get.rke2.io | INSTALL_RKE2_TYPE="agent" INSTALL_RKE2_VERSION="{{ rke2_version }}" sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/rke2

    # ----------------------------
    # Configure agent to register via kube-vip (9345)
    # ----------------------------
    - name: Write RKE2 agent config.yaml (join via VIP:9345)
      copy:
        dest: "{{ rke2_config_file }}"
        mode: "0600"
        content: |
          server: https://{{ kube_vip_ip }}:9345
          token: {{ rke2_token }}

          # Optional (nice for troubleshooting / consistency):
          # node-name defaults to hostname; keep that unless you need override.
          # node-name: {{ inventory_hostname }}

    - name: Enable and start rke2-agent
      systemd:
        name: rke2-agent
        enabled: true
        state: started


    - name: Verify rke2-agent service is active
      systemd:
        name: rke2-agent
      register: rke2_agent_service_check

    - name: Assert rke2-agent is running
      assert:
        that:
          - rke2_agent_service_check.status.ActiveState == "active"
        fail_msg: "rke2-agent service is not active"

    - name: Verify installed RKE2 version matches pin
      command: rke2 --version
      register: rke2_version_check
      changed_when: false

    - name: Assert pinned version is installed
      assert:
        that:
          - rke2_version in rke2_version_check.stdout
        fail_msg: "Installed RKE2 version does not match rke2_version pin"


    - name: Wait until this worker appears in the cluster (checked from master01)
      command: >
        {{ rke2_kubectl }} --kubeconfig {{ rke2_kubeconfig }}
        get node {{ inventory_hostname }}
      delegate_to: "{{ groups['masters'][0] }}"
      register: node_seen
      retries: 30
      delay: 10
      until: node_seen.rc == 0
      changed_when: false

    - name: Wait until this worker is Ready (checked from master01)
      command: >
        {{ rke2_kubectl }} --kubeconfig {{ rke2_kubeconfig }}
        get node {{ inventory_hostname }} -o json
      delegate_to: "{{ groups['masters'][0] }}"
      register: node_json
      retries: 30
      delay: 10
      until: >
        (
          node_json.stdout | from_json
        )['status']['conditions']
        | selectattr('type', 'equalto', 'Ready')
        | selectattr('status', 'equalto', 'True')
        | list
        | length > 0
      changed_when: false

    - name: Worker join summary
      debug:
        msg:
          - "worker: {{ inventory_hostname }} joined and Ready "
          - "rke2-agent active: {{ rke2_agent_service_check.status.ActiveState }}"
          - "rke2 version: {{ rke2_version_check.stdout }}"
          - "joined via VIP: https://{{ kube_vip_ip }}:9345"