

- name: Apply topology labels to all Kubernetes nodes
  hosts: masters[0]         
  become: true
  gather_facts: false

  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Verify all nodes define k8s_zone
      fail:
        msg: "Node {{ item }} does not define k8s_zone in inventory"
      when: hostvars[item].k8s_zone is not defined
      loop: "{{ groups['all'] }}"

    - name: Apply topology labels to nodes
      command: >
        kubectl label node {{ item }}
        topology.kubernetes.io/zone={{ hostvars[item].k8s_zone }}
        topology.kubernetes.io/region={{ k8s_region }}
        --overwrite
      register: label_result
      changed_when: "'labeled' in label_result.stdout or 'configured' in label_result.stdout"
      loop: "{{ groups['all'] }}"

    - name: Topology labeling summary
      debug:
        msg:
          - "Node {{ item }} labeled:"
          - "  zone   = {{ hostvars[item].k8s_zone }}"
          - "  region = {{ k8s_region }}"
      loop: "{{ groups['all'] }}"
